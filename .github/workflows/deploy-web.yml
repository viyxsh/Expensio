name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: stable

      - run: flutter pub get

      # pubspec declares `.env` as an asset; provide an empty one so the build
      # bundles it. (The Gemini key is only used by mobile bill-scanning, which
      # is hidden on web — so an empty key is fine.)
      - run: echo "GEMINI_API_KEY=" > .env

      # Project page is served from /<repo>/, so the base href must match.
      - run: flutter build web --release --base-href /Expensio/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
